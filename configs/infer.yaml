paths:
  test_dir: /kaggle/input/aisehack-theme-2/test_in
  data_dir: /kaggle/temp/data
  model_dir: /kaggle/working
  output_file: /kaggle/working/preds.npy

data:
  input_hours: 10
  forecast_hours: 16
  total_window: 26
  H: 140
  W: 124

features:
