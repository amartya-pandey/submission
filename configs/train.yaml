paths:
  data_dir: /kaggle/temp/data
  out_dir: /kaggle/working

data:
  months: ['APRIL_16', 'JULY_16', 'DEC_16', 'OCT_16']
  input_hours: 10
  forecast_hours: 16
  total_window: 26
  H: 140
  W: 124
  stride: 1
  val_ratio: 0.2

features:
  target: cpm25
  met_features: ['q2', 't2', 'u10', 'v10', 'swdown', 'pblh', 'psfc', 'rain']

model:
  fno_modes_hi: 20
  fno_modes_lo: 8
  fno_width: 64
  fno_layers: 4
  gru_hidden: 32
  dropout: 0.15

training:
  batch_size: 16
  epochs: 200
  lr: 1.0e-3
  max_lr: 2.0e-3
  weight_decay: 1.0e-3
  grad_clip: 1.0
  early_stop_patience: 15
  snapshot_interval: 15

augmentation:
  augment_flips: true
  mixup_alpha: 0.3
  noise_std: 0.05
  cutout_prob: 0.3
  cutout_size: 20

ensemble:
  seeds: [42, 123, 777, 2024, 314]

phase2:
  swa_start_frac: 0.70
  min_retrain_epochs: 60
  extra_epochs: 15
